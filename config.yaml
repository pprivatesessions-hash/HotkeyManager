command_keywords:
  # Разрушение / удаление
  разрушить: "D"
  уничтожить: "D"
  удалить: "X"
  стереть: "X"
  
  # Буфер обмена
  копировать: "C"
  вставить: "V"
  вставка: "V"
  вырезать: "X"
  
  # История
  отменить: "Z"
  повторить: "Y"
  
  # Файл
  сохранить: "S"
  открыть: "O"
  новый: "N"
