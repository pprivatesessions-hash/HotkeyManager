  повернуть: "R"
  вращать: "R"
  масштаб: "Z"
  приблизить: "Z"
  отдалить: "Z"
  
  # Измерение
  линейка: "L"
  размер: "D"
  замер: "L"
  
  # Блоки и группы
  блок: "B"
